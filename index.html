<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logos/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta — visible to bots before React hydrates -->
    <title>Ajayeswaran Raja — AI &amp; Cloud Trainer | Coimbatore</title>
    <meta name="description" content="Corporate Trainer specialising in AI, Data Science, Cloud Computing and DevOps. 2000+ students trained across Tamil Nadu under Naan Mudhalvan, Oracle and IBM programs." />
    <meta name="author" content="Ajayeswaran Raja" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title"       content="Ajayeswaran Raja — AI &amp; Cloud Trainer" />
    <meta property="og:description" content="Corporate Trainer specialising in AI, Data Science, Cloud Computing and DevOps. 2000+ students trained across Tamil Nadu." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://ajayeswaran.com" />
    <meta property="og:site_name"   content="Ajayeswaran Raja" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Ajayeswaran Raja — AI &amp; Cloud Trainer" />
    <meta name="twitter:description" content="Corporate Trainer: AI, Data Science, Cloud &amp; DevOps. 2000+ students trained." />

    <!-- Google Fonts — preconnect to avoid render-blocking @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
